name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libpipewire-0.3-dev libva-dev libxkbcommon-dev libwayland-dev libgbm-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test default features
        run: cargo test

      - name: Test generated inputs
        run: PROPTEST_CASES=512 cargo test generated_

      - name: Test software-only features
        run: cargo test --no-default-features

      - name: Test generated inputs software-only
        run: PROPTEST_CASES=512 cargo test --no-default-features generated_

      - name: Build
        run: cargo build --release
