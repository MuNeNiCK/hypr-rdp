[package]
name = "hypr-rdp"
version = "0.1.0"
edition = "2021"
description = "Native RDP server for Hyprland"
license = "MIT"

[features]
default = ["vaapi"]
vaapi = ["dep:cros-libva"]

[dependencies]
# VA-API hardware encoding (Intel/AMD)
cros-libva = { version = "0.0.13", optional = true }
# RDP server (official Devolutions repo, main branch has EGFX merged)
ironrdp-server = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes", features = ["egfx", "helper"] }
ironrdp-pdu = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-egfx = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-dvc = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-svc = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-cliprdr = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-rdpsnd = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-core = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-displaycontrol = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }
ironrdp-graphics = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }

# H.264 encoding (OpenH264 software encoder)
openh264 = { version = "0.9", features = ["libloading"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["logging", "tls12", "ring"] }
async-trait = "0.1"

# Wayland client
wayland-client = "0.31"
wayland-protocols = { version = "0.32", features = ["client", "unstable", "staging"] }
wayland-protocols-wlr = { version = "0.3", features = ["client"] }
wayland-scanner = "0.31"

# PipeWire audio capture
pipewire = "0.9"

# System
libc = "0.2"

# TLS auto-cert generation
rcgen = "0.13"

# Clipboard image support (DIB/PNG conversion)
ironrdp-cliprdr-format = { git = "https://github.com/MuNeNICK/IronRDP.git", branch = "hypr-rdp-fixes" }

# Config file
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# Utilities
anyhow = "1"
bytes = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
xkbcommon = "0.9.0"
serde_json = "1"
rustls = { version = "0.23", default-features = false }
